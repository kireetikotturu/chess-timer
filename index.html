<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Arena Clock Pro</title>

<style>

:root{
  --bg:#050816;
  --card:#0f172a;
  --green:#10b981;
  --red:#ef4444;
  --blue:#6366f1;
  --orange:#f59e0b;
  --text:#f8fafc;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* =========================
   COMMON
========================= */

button,
input,
select{
  font-family:inherit;
}

/* =========================
   SETTINGS SCREEN
========================= */

#settings-screen{
  width:100%;
  height:100vh;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.title{
  text-align:center;
  font-size:2rem;
  font-weight:800;
  margin-top:10px;
}

.subtitle{
  text-align:center;
  color:var(--muted);
  margin-bottom:10px;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:18px;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:16px;
}

.form-row{
  display:flex;
  gap:12px;
}

.form-row .form-group{
  flex:1;
}

label{
  font-size:.8rem;
  color:var(--muted);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.08em;
}

input,
select{
  width:100%;
  background:#1e293b;
  border:none;
  color:#fff;
  padding:16px;
  border-radius:16px;
  font-size:1rem;
}

.start-btn{
  width:100%;
  background:var(--green);
  border:none;
  color:#fff;
  padding:18px;
  border-radius:20px;
  font-size:1.1rem;
  font-weight:800;
  margin-top:10px;
}

/* =========================
   TIMER SCREEN
========================= */

#timer-screen{
  display:none;
  width:100%;
  height:100vh;
  position:relative;
}

#clocks-container{
  width:100%;
  height:100%;
  display:grid;
  gap:6px;
  padding:6px;
}

.clock-face{
  background:#111827;
  border-radius:24px;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

.clock-face.active{
  background:rgba(16,185,129,.15);
  border:3px solid var(--green);
}

.clock-face.flagged{
  background:rgba(239,68,68,.15);
  border:3px solid var(--red);
}

.player-label{
  position:absolute;
  top:18px;
  font-size:.9rem;
  font-weight:700;
  color:var(--muted);
  letter-spacing:.1em;
  text-transform:uppercase;
}

.time-display{
  font-size:clamp(4rem,18vw,10rem);
  font-weight:900;
  line-height:1;
}

.delay-display{
  margin-top:12px;
  color:var(--orange);
  font-weight:700;
}

/* =========================
   GRID
========================= */

.grid-2{
  grid-template-columns:1fr;
  grid-template-rows:1fr 1fr;
}

.grid-3{
  grid-template-columns:1fr;
  grid-template-rows:1fr 1fr 1fr;
}

.grid-4{
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
}

/* =========================
   FLOATING CONTROLS
========================= */

.floating-controls{
  position:absolute;
  top:16px;
  right:16px;
  display:flex;
  gap:10px;
  z-index:20;
}

.float-btn{
  width:52px;
  height:52px;
  border:none;
  border-radius:50%;
  background:rgba(15,23,42,.85);
  color:#fff;
  font-size:1.2rem;
  backdrop-filter:blur(10px);
}

/* =========================
   MOBILE IMPROVEMENTS
========================= */

@media(max-width:480px){

  .time-display{
    font-size:clamp(3.5rem,20vw,7rem);
  }

  .clock-face{
    border-radius:18px;
  }

  .player-label{
    font-size:.75rem;
  }

}

</style>
</head>

<body>

<!-- =========================
     SETTINGS PAGE
========================= -->

<div id="settings-screen">

<div>
<div class="title">Arena Clock</div>
<div class="subtitle">
Modern Multiplayer Chess Timer
</div>
</div>

<div class="card">

<div class="form-group">
<label>Players</label>
<select id="player-count">
<option value="2">2 Players</option>
<option value="3">3 Players</option>
<option value="4">4 Players</option>
</select>
</div>

<div class="form-row">

<div class="form-group">
<label>Minutes</label>
<input type="number" id="base-min" value="5">
</div>

<div class="form-group">
<label>Seconds</label>
<input type="number" id="base-sec" value="0">
</div>

</div>

<div class="form-group">
<label>Increment</label>
<input type="number" id="extra-sec" value="0">
</div>

<div class="form-group">
<label>Method</label>
<select id="timing-method">
<option value="bronstein">Bronstein</option>
<option value="fischer">Fischer</option>
<option value="sudden">Sudden Death</option>
</select>
</div>

<button class="start-btn" id="start-game">
START GAME
</button>

</div>

</div>

<!-- =========================
     TIMER PAGE
========================= -->

<div id="timer-screen">

<div class="floating-controls">

<button class="float-btn" id="back-btn">
⚙
</button>

<button class="float-btn" id="reset-btn">
↺
</button>

</div>

<div id="clocks-container"></div>

</div>

<script>

let playerCount=2;
let activePlayer=1;
let isRunning=false;
let intervalId=null;

let playerTimes=[];
let playerDead=[];

const settingsScreen=
document.getElementById('settings-screen');

const timerScreen=
document.getElementById('timer-screen');

const container=
document.getElementById('clocks-container');

function formatTime(sec){

if(sec<=0) return "00:00";

const m=Math.floor(sec/60);
const s=Math.ceil(sec%60);

return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

}

function buildGrid(){

container.innerHTML="";

playerCount=parseInt(
document.getElementById('player-count').value
);

container.className="";

if(playerCount===2){
container.classList.add('grid-2');
}

if(playerCount===3){
container.classList.add('grid-3');
}

if(playerCount===4){
container.classList.add('grid-4');
}

for(let i=1;i<=playerCount;i++){

const face=document.createElement('div');

face.className='clock-face';
face.id=`player${i}`;

face.innerHTML=`

<div class="player-label">
PLAYER ${i}
</div>

<div class="time-display"
id="time${i}">
00:00
</div>

<div class="delay-display"
id="delay${i}">
</div>

`;

face.addEventListener('click',()=>switchTurn(i));

container.appendChild(face);

}

}

function initGame(){

buildGrid();

const min=parseInt(
document.getElementById('base-min').value
)||0;

const sec=parseInt(
document.getElementById('base-sec').value
)||0;

const total=(min*60)+sec;

playerTimes=[];
playerDead=[];

for(let i=1;i<=playerCount;i++){

playerTimes[i]=total;
playerDead[i]=false;

document.getElementById(
`time${i}`
).textContent=formatTime(total);

}

activePlayer=1;

document.getElementById(
'player1'
).classList.add('active');

}

function startGame(){

settingsScreen.style.display='none';

timerScreen.style.display='block';

initGame();

isRunning=true;

intervalId=setInterval(tick,100);

}

function tick(){

if(!isRunning) return;

playerTimes[activePlayer]-=.1;

if(playerTimes[activePlayer]<=0){

playerTimes[activePlayer]=0;

document.getElementById(
`time${activePlayer}`
).textContent='00:00';

document.getElementById(
`player${activePlayer}`
).classList.add('flagged');

playerDead[activePlayer]=true;

clearInterval(intervalId);

return;

}

document.getElementById(
`time${activePlayer}`
).textContent=
formatTime(playerTimes[activePlayer]);

}

function switchTurn(player){

if(player!==activePlayer) return;

document.getElementById(
`player${activePlayer}`
).classList.remove('active');

let next=player;

do{
next=(next%playerCount)+1;
}
while(playerDead[next]);

activePlayer=next;

document.getElementById(
`player${activePlayer}`
).classList.add('active');

}

document.getElementById(
'start-game'
).addEventListener('click',startGame);

document.getElementById(
'back-btn'
).addEventListener('click',()=>{

clearInterval(intervalId);

timerScreen.style.display='none';

settingsScreen.style.display='flex';

});

document.getElementById(
'reset-btn'
).addEventListener('click',()=>{

clearInterval(intervalId);

initGame();

intervalId=setInterval(tick,100);

});

</script>

</body>
</html>
