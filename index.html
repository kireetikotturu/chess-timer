<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Elite Multi-Player Arena Clock</title>

<style>

:root{
  --bg-main:#060913;
  --bg-card:#0d1322;
  --bg-active:#10b981;
  --bg-inactive:#1e293b;
  --text-primary:#f8fafc;
  --text-muted:#64748b;
  --accent:#4f46e5;
  --danger:#ef4444;
  --warning:#f59e0b;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  min-height:100vh;
  overflow-x:hidden;
  background:var(--bg-main);
  color:var(--text-primary);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* =========================
   BODY
========================= */

body{
  display:flex;
  flex-direction:column;
}

/* =========================
   NETWORK ALERT
========================= */

#network-alert{
  background:var(--danger);
  color:#fff;
  text-align:center;
  padding:10px;
  font-size:.85rem;
  font-weight:700;
  display:none;
  z-index:100;
}

/* =========================
   CONFIG PANEL
========================= */

#config-panel{
  background:var(--bg-card);
  padding:16px;
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:flex-end;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:6px;
  flex:1;
  min-width:120px;
}

label{
  font-size:.65rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--text-muted);
  font-weight:700;
}

input,
select{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  color:#fff;
  padding:12px;
  border-radius:10px;
  font-size:.9rem;
  outline:none;
}

option{
  background:#0d1322;
}

input:focus,
select:focus{
  border-color:var(--accent);
}

.checkbox-group{
  flex-direction:row;
  align-items:center;
  gap:8px;
  min-width:auto;
}

input[type="checkbox"]{
  width:18px;
  height:18px;
  accent-color:var(--bg-active);
}

/* =========================
   BUTTONS
========================= */

#global-controls{
  display:flex;
  gap:10px;
  margin-left:auto;
}

.btn{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  font-size:.9rem;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.btn-start{
  background:var(--bg-active);
  color:#fff;
}

.btn-pause{
  background:var(--warning);
  color:#fff;
  display:none;
}

.btn-reset{
  background:rgba(255,255,255,.05);
  color:#fff;
}

/* =========================
   CLOCK GRID
========================= */

#clocks-container{
  flex:1;
  display:grid;
  gap:12px;
  padding:12px;
  width:100%;
}

/* =========================
   CLOCK FACE
========================= */

.clock-face{
  background:var(--bg-inactive);
  border-radius:18px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
  cursor:pointer;
  overflow:hidden;
  min-height:180px;
  transition:.2s;
}

.clock-face.active{
  background:rgba(16,185,129,.1);
  border:3px solid var(--bg-active);
}

.clock-face.flagged{
  background:rgba(239,68,68,.2);
  border:3px solid var(--danger);
}

.clock-face.disabled{
  opacity:.3;
}

/* =========================
   TEXT
========================= */

.player-label{
  position:absolute;
  top:16px;
  font-size:.8rem;
  text-transform:uppercase;
  color:var(--text-muted);
  font-weight:700;
  letter-spacing:.1em;
}

.time-display{
  font-size:clamp(2.5rem,8vw,6rem);
  font-weight:800;
  line-height:1;
  text-align:center;
}

.delay-display{
  margin-top:8px;
  color:var(--warning);
  font-size:1rem;
  font-weight:700;
}

/* =========================
   GRID LAYOUTS
========================= */

.grid-2-opposite{
  grid-template-columns:1fr;
  grid-template-rows:1fr 1fr;
}

.grid-2-opposite #player1-face{
  transform:rotate(180deg);
}

.grid-2-side{
  grid-template-columns:1fr 1fr;
}

.grid-3-mix{
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
}

.grid-3-mix #player3-face{
  grid-column:span 2;
}

.grid-4-square{
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
}

/* =========================
   SPACEBAR HINT
========================= */

#spacebar-hint{
  text-align:center;
  padding:10px;
  color:var(--text-muted);
  font-size:.8rem;
}

/* =========================
   MOBILE FIXES
========================= */

@media(max-width:768px){

  #config-panel{
    flex-direction:column;
    align-items:stretch;
    gap:10px;
    padding:12px;
  }

  .form-group{
    width:100%;
    min-width:100%;
  }

  input,
  select{
    width:100%;
    font-size:16px;
  }

  #global-controls{
    width:100%;
    margin:0;
  }

  .btn{
    flex:1;
    width:100%;
  }

  #clocks-container{
    gap:8px;
    padding:8px;
  }

  .grid-2-side,
  .grid-2-opposite{
    grid-template-columns:1fr;
    grid-template-rows:1fr 1fr;
  }

  .grid-3-mix{
    grid-template-columns:1fr;
    grid-template-rows:repeat(3,1fr);
  }

  .grid-3-mix #player3-face{
    grid-column:auto;
  }

  .grid-4-square{
    grid-template-columns:1fr;
    grid-template-rows:repeat(4,1fr);
  }

  .clock-face{
    min-height:120px;
    padding:10px;
  }

  .time-display{
    font-size:clamp(2rem,12vw,4rem);
  }

  .player-label{
    position:static;
    margin-bottom:10px;
  }

  #spacebar-hint{
    display:none;
  }
}

@media(max-width:480px){

  .clock-face{
    min-height:100px;
  }

  .time-display{
    font-size:clamp(1.8rem,14vw,3rem);
  }

  .btn{
    padding:10px;
    font-size:.8rem;
  }
}

</style>
</head>

<body>

<div id="network-alert">
INTERNET DISRUPTED - CLOCK PAUSED
</div>

<div id="config-panel">

<div class="form-group">
<label>Players</label>
<select id="player-count">
<option value="2">2 Players</option>
<option value="3">3 Players</option>
<option value="4">4 Players</option>
</select>
</div>

<div class="form-group" id="layout-wrapper">
<label>Orientation</label>
<select id="player-layout">
<option value="opposite">Face to Face</option>
<option value="side">Side by Side</option>
</select>
</div>

<div class="form-group">
<label>Minutes</label>
<input type="number" id="base-min" value="0">
</div>

<div class="form-group">
<label>Seconds</label>
<input type="number" id="base-sec" value="30">
</div>

<div class="form-group">
<label>Delay</label>
<input type="number" id="extra-sec" value="0">
</div>

<div class="form-group">
<label>Method</label>
<select id="timing-method">
<option value="bronstein">Bronstein</option>
<option value="sudden">Sudden Death</option>
<option value="fischer">Fischer</option>
</select>
</div>

<div class="form-group checkbox-group">
<input type="checkbox" id="sound-toggle" checked>
<label for="sound-toggle">Audio</label>
</div>

<div id="global-controls">
<button class="btn btn-start" id="btn-start">Go!</button>
<button class="btn btn-pause" id="btn-pause">Pause</button>
<button class="btn btn-reset" id="btn-reset">Reset</button>
</div>

</div>

<div id="clocks-container"></div>

<div id="spacebar-hint">
Press SPACEBAR to switch turns
</div>

<script>

let audioCtx=null;

function playSound(type){

if(!document.getElementById('sound-toggle').checked) return;

if(!audioCtx){
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

if(type==="switch"){
osc.frequency.value=600;
gain.gain.value=.05;
osc.start();
osc.stop(audioCtx.currentTime+.05);
}

if(type==="warning"){
osc.frequency.value=900;
gain.gain.value=.08;
osc.start();
osc.stop(audioCtx.currentTime+.1);
}

if(type==="gameover"){
osc.frequency.value=220;
gain.gain.value=.2;
osc.start();
osc.stop(audioCtx.currentTime+.4);
}

}

let isRunning=false;
let activePlayer=null;
let intervalId=null;
let playerCount=2;

let playerTimes=[];
let playerEliminated=[];
let turnStartTimes=[];

const btnStart=document.getElementById('btn-start');
const btnPause=document.getElementById('btn-pause');
const btnReset=document.getElementById('btn-reset');

const container=document.getElementById('clocks-container');

const countSelector=document.getElementById('player-count');
const layoutSelector=document.getElementById('player-layout');

function formatTime(sec){

if(sec<=0) return "00:00";

const m=Math.floor(sec/60);
const s=Math.ceil(sec%60);

return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

}

function rebuildGrid(){

playerCount=parseInt(countSelector.value);

container.innerHTML="";

if(playerCount===2){
container.className=
layoutSelector.value==="side"
? "grid-2-side"
: "grid-2-opposite";
}

if(playerCount===3){
container.className="grid-3-mix";
}

if(playerCount===4){
container.className="grid-4-square";
}

for(let i=1;i<=playerCount;i++){

const face=document.createElement('div');

face.className='clock-face disabled';
face.id=`player${i}-face`;

face.innerHTML=`
<div class="player-label">Player ${i}</div>
<div class="time-display" id="p${i}-time">00:00</div>
<div class="delay-display" id="p${i}-delay"></div>
`;

face.addEventListener('click',()=>switchTurn(i));

container.appendChild(face);

}

}

function initClocks(){

const mins=parseInt(document.getElementById('base-min').value)||0;
const secs=parseInt(document.getElementById('base-sec').value)||30;

const total=(mins*60)+secs;

playerTimes=[];
playerEliminated=[];
turnStartTimes=[];

rebuildGrid();

for(let i=1;i<=playerCount;i++){

playerTimes[i]=total;
playerEliminated[i]=false;
turnStartTimes[i]=total;

document.getElementById(`p${i}-time`).textContent=formatTime(total);

}

}

function startTimer(){

if(isRunning) return;

isRunning=true;

btnStart.style.display='none';
btnPause.style.display='block';

if(!activePlayer){

activePlayer=1;

document.getElementById('player1-face')
.classList.add('active');

}

intervalId=setInterval(()=>{

playerTimes[activePlayer]-=.1;

if(playerTimes[activePlayer]<=10){
playSound('warning');
}

if(playerTimes[activePlayer]<=0){

playerTimes[activePlayer]=0;

document.getElementById(
`p${activePlayer}-time`
).textContent='00:00';

flagFall(activePlayer);

return;
}

document.getElementById(
`p${activePlayer}-time`
).textContent=formatTime(playerTimes[activePlayer]);

},100);

}

function pauseTimer(){

isRunning=false;

clearInterval(intervalId);

btnStart.style.display='block';
btnPause.style.display='none';

}

function switchTurn(player){

if(!isRunning) return;
if(activePlayer!==player) return;

playSound('switch');

document.getElementById(
`player${activePlayer}-face`
).classList.remove('active');

let next=player;

do{
next=(next%playerCount)+1;
}
while(playerEliminated[next]);

activePlayer=next;

document.getElementById(
`player${activePlayer}-face`
).classList.add('active');

}

function flagFall(player){

playSound('gameover');

playerEliminated[player]=true;

document.getElementById(
`player${player}-face`
).classList.add('flagged');

pauseTimer();

}

btnStart.addEventListener('click',()=>{

if(container.children.length===0){
initClocks();
}

startTimer();

});

btnPause.addEventListener('click',pauseTimer);

btnReset.addEventListener('click',()=>{

pauseTimer();

activePlayer=null;

initClocks();

});

countSelector.addEventListener('change',()=>{

if(!isRunning){
initClocks();
}

});

layoutSelector.addEventListener('change',()=>{

if(!isRunning){
initClocks();
}

});

document.addEventListener('keydown',(e)=>{

if(e.code==="Space"){

e.preventDefault();

if(isRunning&&activePlayer){
switchTurn(activePlayer);
}

}

});

window.addEventListener('offline',()=>{

pauseTimer();

document.getElementById('network-alert')
.style.display='block';

});

window.addEventListener('online',()=>{

document.getElementById('network-alert')
.style.display='none';

});

initClocks();

</script>

</body>
</html>
